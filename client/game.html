<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>UFO Tank 3D</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <canvas id="game" aria-label="UFO Tank 3D game"></canvas>

    <main class="hud" aria-live="polite">
      <section class="topbar">
        <div class="stat-block health-block">
          <span>HP</span>
          <div class="health-track" aria-hidden="true">
            <div id="healthFill" class="health-fill"></div>
          </div>
          <strong id="healthText">100</strong>
        </div>
        <div class="stat-block">
          <span>SCORE</span>
          <strong id="scoreText">0</strong>
        </div>
        <div class="stat-block">
          <span>WAVE</span>
          <strong id="waveText">1</strong>
        </div>
        <button id="pauseButton" class="icon-button" type="button" aria-label="Pause">II</button>
      </section>

      <div class="mode-badge">
        <strong id="modeNameText">CHỌN MODE</strong>
        <span id="modeHelpText">AUTO-FIRE</span>
      </div>

      <div class="crosshair" aria-hidden="true">
        <span></span>
        <span></span>
      </div>

      <section class="touch-layer" aria-hidden="true">
        <div id="joystick" class="joystick">
          <div id="joystickStick" class="joystick-stick"></div>
        </div>
        <button id="fireButton" class="fire-button" type="button" aria-label="Fire">◎</button>
      </section>

      <section id="modePanel" class="mode-panel">
        <div class="mode-panel-header">
          <h1>CHỌN CHẾ ĐỘ</h1>
          <p>Ngắm vào UFO để xe tăng tự bắn.</p>
        </div>
        <div class="mode-grid">
          <button class="mode-card" type="button" data-mode="training">
            <span>TẬP LUYỆN</span>
            <strong>Êm</strong>
          </button>
          <button class="mode-card active" type="button" data-mode="survival">
            <span>SINH TỒN</span>
            <strong>Chuẩn</strong>
          </button>
          <button class="mode-card" type="button" data-mode="assault">
            <span>ĐỘT KÍCH</span>
            <strong>Căng</strong>
          </button>
        </div>
      </section>

      <section id="statusPanel" class="status-panel hidden">
        <h1 id="statusTitle">PAUSED</h1>
        <p id="statusLine">SCORE 0</p>
        <div class="status-actions">
          <button id="restartButton" class="primary-button" type="button">RETRY</button>
          <button id="chooseModeButton" class="secondary-button" type="button">MODE</button>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
