<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>UFO Tank 3D Pro</title>
  <link rel="stylesheet" href="/src/styles.css" />
  <style>
    body { margin: 0; padding: 0; overflow: hidden; }
    canvas { display: block; width: 100%; height: 100%; }
    .hud { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
    .hud > * { pointer-events: auto; }
    
    .topbar { position: fixed; top: 20px; left: 20px; right: 20px; display: flex; gap: 20px; z-index: 100; }
    .stat-block { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(103, 232, 249, 0.3); padding: 12px 16px; border-radius: 8px; color: #f8fafc; font-weight: bold; }
    .stat-block span { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
    .stat-block strong { display: block; font-size: 16px; }
    .health-track { width: 100px; height: 8px; background: rgba(0,0,0,0.5); border-radius: 4px; margin: 4px 0; overflow: hidden; }
    .health-fill { height: 100%; background: #10b981; width: 100%; }
    .icon-button { background: rgba(103, 232, 249, 0.1); border: 1px solid rgba(103, 232, 249, 0.3); color: #67e8f9; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    
    .mode-badge { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(103, 232, 249, 0.3); padding: 20px; border-radius: 12px; text-align: center; color: #f8fafc; z-index: 100; }
    .mode-badge strong { display: block; font-size: 20px; color: #67e8f9; margin-bottom: 8px; }
    .mode-badge span { display: block; font-size: 14px; color: #94a3b8; }
    
    .crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; pointer-events: none; z-index: 50; }
    .crosshair span { position: absolute; background: rgba(103, 232, 249, 0.6); }
    .crosshair span:nth-child(1) { width: 2px; height: 10px; left: 50%; top: 0; transform: translateX(-50%); }
    .crosshair span:nth-child(2) { width: 10px; height: 2px; left: 0; top: 50%; transform: translateY(-50%); }
    
    .touch-layer { position: fixed; bottom: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: flex-end; z-index: 100; }
    .joystick { width: 120px; height: 120px; background: rgba(103, 232, 249, 0.1); border: 2px solid rgba(103, 232, 249, 0.3); border-radius: 50%; position: relative; }
    .joystick-stick { width: 40px; height: 40px; background: rgba(103, 232, 249, 0.5); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .fire-button { width: 100px; height: 100px; background: rgba(239, 68, 68, 0.8); border: 2px solid rgba(239, 68, 68, 1); border-radius: 50%; color: white; font-size: 24px; cursor: pointer; font-weight: bold; }
    
    .mode-panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(103, 232, 249, 0.3); padding: 24px; border-radius: 12px; max-width: 500px; z-index: 1000; }
    .mode-panel-header h1 { color: #67e8f9; margin: 0 0 8px 0; font-size: 24px; }
    .mode-panel-header p { color: #94a3b8; margin: 0; font-size: 14px; }
    .mode-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
    .mode-card { background: rgba(103, 232, 249, 0.1); border: 1px solid rgba(103, 232, 249, 0.3); color: #f8fafc; padding: 16px; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
    .mode-card:hover { background: rgba(103, 232, 249, 0.2); }
    .mode-card.active { background: #67e8f9; color: #0f172a; border-color: #67e8f9; }
    .mode-card span { display: block; font-size: 12px; margin-bottom: 8px; }
    .mode-card strong { display: block; font-size: 16px; }
    
    .status-panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(103, 232, 249, 0.3); padding: 24px; border-radius: 12px; text-align: center; z-index: 1000; }
    .status-panel h1 { color: #67e8f9; margin: 0 0 8px 0; font-size: 32px; }
    .status-panel p { color: #f8fafc; margin: 0 0 16px 0; }
    .status-actions { display: flex; gap: 12px; }
    .primary-button, .secondary-button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .primary-button { background: #10b981; color: white; }
    .secondary-button { background: rgba(103, 232, 249, 0.1); border: 1px solid rgba(103, 232, 249, 0.3); color: #67e8f9; }
    
    .hidden { display: none !important; }
    
    .currency-display { position: fixed; top: 20px; right: 20px; background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(103, 232, 249, 0.3); padding: 12px 16px; border-radius: 8px; color: #facc15; font-weight: bold; z-index: 100; }
    .shop-button { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; background: #67e8f9; color: #0f172a; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; z-index: 100; }
    
    #shopPanel { display: none; }
    #shopPanel.active { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <main class="hud" aria-live="polite">
    <section class="topbar">
      <div class="stat-block health-block">
        <span>HP</span>
        <div class="health-track"><div id="healthFill" class="health-fill"></div></div>
        <strong id="healthText">100</strong>
      </div>
      <div class="stat-block"><span>SCORE</span><strong id="scoreText">0</strong></div>
      <div class="stat-block"><span>WAVE</span><strong id="waveText">1</strong></div>
      <button id="pauseButton" class="icon-button" type="button">II</button>
    </section>
    <div class="mode-badge"><strong id="modeNameText">CHỌN MODE</strong><span id="modeHelpText">AUTO-FIRE</span></div>
    <div class="crosshair"><span></span><span></span></div>
    <section class="touch-layer">
      <div id="joystick" class="joystick"><div id="joystickStick" class="joystick-stick"></div></div>
      <button id="fireButton" class="fire-button" type="button">◎</button>
    </section>
    <section id="modePanel" class="mode-panel">
      <div class="mode-panel-header"><h1>CHỌN CHẾ ĐỘ</h1><p>Ngắm vào UFO để xe tăng tự bắn.</p></div>
      <div class="mode-grid">
        <button class="mode-card" type="button" data-mode="training"><span>TẬP LUYỆN</span><strong>Êm</strong></button>
        <button class="mode-card active" type="button" data-mode="survival"><span>SINH TỒN</span><strong>Chuẩn</strong></button>
        <button class="mode-card" type="button" data-mode="assault"><span>ĐỘT KÍCH</span><strong>Căng</strong></button>
      </div>
    </section>
    <section id="statusPanel" class="status-panel hidden"><h1 id="statusTitle">PAUSED</h1><p id="statusLine">SCORE 0</p><div class="status-actions"><button id="restartButton" class="primary-button">RETRY</button><button id="chooseModeButton" class="secondary-button">MODE</button></div></section>
    <div id="lobbyContainer"></div>
    <div id="shopPanel"></div>
  </main>
  <div class="currency-display" id="currencyDisplay">₳ 1000</div>
  <button class="shop-button" id="shopButton">SHOP</button>

  <script type="module">
    import { initializeExtensions, updateExtensions, createLobby, openShop } from './src/extensions/integration.js';
    import { currencyManager } from './src/extensions/currency.js';
    
    // Initialize game and extensions
    window.addEventListener('DOMContentLoaded', () => {
      console.log('Game Pro loaded');
      createLobby('lobbyContainer');
    });
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
